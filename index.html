<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StanceQ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Logo Section -->
    <div class="logo-container">
        <img src="https://i.postimg.cc/vTqCQjmt/logo-Stance-Q-small.png" alt="StanceQ Logo">
    </div>

    <h1>Welcome to StanceQ!</h1>

    <!-- Chatbot Form -->
    <form id="inputForm">
        <label for="userInput">Enter your text:</label>
        <textarea 
            id="userInput" 
            name="userInput" 
            rows="3" 
            required>
        </textarea>
        <br><br>
        <button type="submit">Submit</button>
    </form>

    <!-- Anchor for smooth scroll -->
    <div id="responseTop"></div>

    <!-- GPT Response Container -->
    <div id="outputContainer">
        <div id="output"></div>
    </div>

    <!-- JavaScript -->
    <script>
    document.getElementById('inputForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const userInput = document.getElementById('userInput').value;
        const outputDiv = document.getElementById('output');
        const outputContainer = document.getElementById('outputContainer');
        const submitButton = document.querySelector('#inputForm button[type="submit"]');
        const responseTop = document.getElementById('responseTop');

        // Show loading state immediately
        outputDiv.innerText = "StanceQ is analyzing your draft and generating feedback…";
        outputContainer.style.display = "block";
        submitButton.disabled = true;

        // Scroll smoothly to response section
        requestAnimationFrame(() => {
            responseTop.scrollIntoView({
                behavior: "smooth",
                block: "start"
            });
        });

        try {
            const response = await fetch('https://gpt-backend-wlm2.onrender.com/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: userInput })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const data = await response.json();
            outputDiv.innerText = data.answer;

        } catch (error) {
            console.error("Error:", error);
            outputDiv.innerText = "An error occurred while processing your request.";
        } finally {
            setTimeout(() => {
                submitButton.disabled = false;
            }, 20000);
        }
    });
    </script>

</body>
</html>
